<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FAFAF9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kayzen">
<title>Kayzen — Samaradorlik</title>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23FAFAF9'/><path d='M28 52 L44 68 L74 36' stroke='%232563EB' stroke-width='10' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23FAFAF9'/><path d='M28 52 L44 68 L74 36' stroke='%232563EB' stroke-width='10' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
/* === DESIGN TOKENS === */
:root {
  --bg: #FAFAF9;
  --surface: #FFFFFF;
  --surface-2: #F4F4F5;
  --surface-3: #EFEFEF;
  --border: #E4E4E7;
  --border-strong: #D4D4D8;
  --text: #18181B;
  --text-muted: #71717A;
  --text-light: #A1A1AA;
  --accent: #2563EB;
  --accent-hover: #1D4ED8;
  --accent-soft: #DBEAFE;
  --success: #16A34A;
  --success-soft: #DCFCE7;
  --warning: #F59E0B;
  --warning-soft: #FEF3C7;
  --danger: #DC2626;
  --danger-soft: #FEE2E2;
  --purple: #8B5CF6;
  --purple-soft: #EDE9FE;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Roboto", system-ui, "Segoe UI", sans-serif;
  font-size: 16px; line-height: 1.5; color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: none;
}
button, input, textarea, select {
  font: inherit; color: inherit; background: none; border: none; outline: none;
}
button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
input, textarea { -webkit-user-select: text; user-select: text; }
ul, ol { list-style: none; }
a { color: var(--accent); text-decoration: none; }

/* === LAYOUT === */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  background: var(--bg);
  position: relative;
}
@media (min-width: 481px) {
  #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
}

#topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(250, 250, 249, 0.85);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  padding: calc(var(--safe-top) + 14px) 16px 12px;
  border-bottom: 1px solid var(--border);
}
.topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.topbar-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.topbar-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.topbar-actions { display: flex; gap: 6px; }

.icon-btn {
  width: 38px; height: 38px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 10px;
  color: var(--text);
  transition: background 150ms ease-out;
}
.icon-btn:hover, .icon-btn:active { background: var(--surface-2); }
.icon-btn svg { width: 22px; height: 22px; }

#main {
  flex: 1;
  padding: 0 16px 120px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.view { display: none; padding-top: 12px; }
.view.active { display: block; animation: fadeIn 220ms ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* === BOTTOM NAV === */
#bottombar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  display: flex; justify-content: center;
  padding-bottom: var(--safe-bottom);
  pointer-events: none;
}
.bottombar-inner {
  width: 100%; max-width: 480px;
  display: grid; grid-template-columns: repeat(4, 1fr);
  background: rgba(255,255,255,0.92);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-top: 1px solid var(--border);
  pointer-events: auto;
}
.tab {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px;
  padding: 10px 4px 12px;
  color: var(--text-muted);
  font-size: 11px; font-weight: 500;
  transition: color 150ms ease-out;
}
.tab svg { width: 24px; height: 24px; }
.tab.active { color: var(--accent); }
.tab:active { transform: scale(0.96); }

/* === FAB === */
#fab {
  position: fixed; bottom: calc(82px + var(--safe-bottom)); right: 16px; z-index: 45;
  width: 56px; height: 56px;
  border-radius: 28px;
  background: var(--accent); color: white;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-lg), 0 0 0 4px rgba(37,99,235,0.1);
  transition: transform 150ms ease-out, background 150ms ease-out;
}
#fab:active { transform: scale(0.94); background: var(--accent-hover); }
#fab svg { width: 26px; height: 26px; }
@media (min-width: 481px) {
  #fab { right: calc(50% - 240px + 16px); }
}

/* === CARDS === */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  box-shadow: var(--shadow-sm);
}
.card + .card { margin-top: 10px; }

/* === BUTTONS === */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 16px; min-height: 44px;
  border-radius: 10px;
  font-size: 15px; font-weight: 500;
  transition: all 150ms ease-out;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:active { background: var(--accent-hover); transform: scale(0.98); }
.btn-secondary { background: var(--surface-2); color: var(--text); }
.btn-secondary:active { background: var(--surface-3); }
.btn-danger { background: var(--danger-soft); color: var(--danger); }
.btn-danger:active { background: #FCC; }
.btn-ghost { color: var(--text-muted); }
.btn-ghost:active { background: var(--surface-2); }
.btn-block { width: 100%; }

/* === INPUTS === */
.input, .textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 16px;
  transition: border-color 150ms ease-out;
}
.input:focus, .textarea:focus { border-color: var(--accent); }
.textarea { resize: none; min-height: 80px; line-height: 1.5; }
.input::placeholder, .textarea::placeholder { color: var(--text-light); }

/* === CHIPS === */
.chip-row {
  display: flex; gap: 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding: 4px 0 8px;
  scrollbar-width: none;
}
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  flex: 0 0 auto;
  padding: 7px 14px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 13px; font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
  transition: all 150ms ease-out;
}
.chip.active { background: var(--text); color: white; border-color: var(--text); }
.chip:active { transform: scale(0.96); }

/* === BADGES === */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.01em;
}
.badge-important { background: var(--danger-soft); color: var(--danger); }
.badge-todo { background: var(--accent-soft); color: var(--accent); }
.badge-delegated { background: var(--purple-soft); color: var(--purple); }
.badge-meta { background: var(--surface-2); color: var(--text-muted); }

/* === TASK CARD === */
.task-card {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  transition: all 150ms ease-out;
  position: relative;
}
.task-card:active { background: var(--surface-2); transform: scale(0.995); }
.task-check {
  flex: 0 0 26px; width: 26px; height: 26px;
  margin-top: 2px;
  border-radius: 50%;
  border: 2px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  transition: all 150ms ease-out;
}
.task-check svg { width: 14px; height: 14px; color: white; opacity: 0; }
.task-card.completed .task-check { background: var(--success); border-color: var(--success); }
.task-card.completed .task-check svg { opacity: 1; }
.task-card.completed .task-title { text-decoration: line-through; color: var(--text-muted); }
.task-body { flex: 1; min-width: 0; }
.task-title {
  font-size: 15px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 4px;
}
.task-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 12px; color: var(--text-muted); }
.task-meta .badge { font-size: 10px; padding: 2px 7px; }

/* === MIT BLOCK === */
.mit-block {
  background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
  border: 1px solid #BFDBFE;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 16px;
}
.mit-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.mit-title { font-size: 14px; font-weight: 600; color: #1E40AF; }
.mit-empty {
  color: #3B82F6; font-size: 13px; padding: 12px 4px; text-align: center;
}
.mit-block .task-card { background: white; }

/* === CHECKLIST === */
.checklist-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}
.stat-card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.stat-card .value { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
.stat-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.progress-ring { display: flex; align-items: center; justify-content: center; gap: 12px; }
.ring-wrap { position: relative; width: 56px; height: 56px; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-wrap .ring-text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.progress-right { text-align: left; }
.progress-right .big { font-size: 18px; font-weight: 700; }
.progress-right .small { font-size: 11px; color: var(--text-muted); }

.streak-emoji { font-size: 24px; }
.streak-text-wrap { text-align: left; }

.habit-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
  transition: all 150ms ease-out;
}
.habit-row:active { transform: scale(0.99); }
.habit-emoji {
  flex: 0 0 36px; width: 36px; height: 36px;
  background: var(--surface-2);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.habit-info { flex: 1; min-width: 0; }
.habit-name { font-size: 15px; font-weight: 500; }
.habit-spark { display: flex; gap: 3px; margin-top: 4px; }
.spark-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--surface-3);
}
.spark-dot.done { background: var(--success); }
.spark-dot.today { box-shadow: 0 0 0 2px var(--accent-soft); }

.habit-check {
  flex: 0 0 28px; width: 28px; height: 28px;
  border-radius: 8px;
  border: 2px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  transition: all 150ms ease-out;
}
.habit-check svg { width: 16px; height: 16px; color: white; opacity: 0; transition: opacity 150ms; }
.habit-row.done .habit-check { background: var(--success); border-color: var(--success); }
.habit-row.done .habit-check svg { opacity: 1; }
.habit-row.done .habit-name { color: var(--text-muted); }

/* === DATE NAV === */
.date-nav {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px;
  margin-bottom: 14px;
}
.date-nav button.nav-arrow {
  width: 38px; height: 38px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.date-nav button.nav-arrow:active { background: var(--surface-2); }
.date-nav .nav-arrow svg { width: 20px; height: 20px; color: var(--text-muted); }
.date-nav .date-label {
  flex: 1; text-align: center; padding: 0 8px;
  font-weight: 600; font-size: 15px;
}
.date-nav .date-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* === KAYZEN === */
.kayzen-intro {
  background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
  border: 1px solid #FCD34D;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 14px;
  font-size: 13px;
  color: #78350F;
}
.kayzen-q {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}
.kayzen-q .q-text { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
.kayzen-q .textarea { min-height: 90px; background: var(--surface-2); border: none; }
.kayzen-q .textarea:focus { background: white; box-shadow: 0 0 0 2px var(--accent-soft); }
.save-indicator {
  font-size: 11px; color: var(--success);
  text-align: right;
  margin-top: 6px;
  opacity: 0; transition: opacity 300ms;
}
.save-indicator.show { opacity: 1; }

/* === STATS === */
.stats-section { margin-bottom: 20px; }
.stats-section h3 {
  font-size: 13px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 10px;
  padding: 0 4px;
}
.stat-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.heatmap {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
}
.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 4px;
  background: var(--surface-3);
  cursor: pointer;
}
.heatmap-legend {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-muted);
  margin-top: 8px; padding: 0 4px;
}
.heatmap-legend .swatch { width: 12px; height: 12px; border-radius: 3px; }

.habit-stat-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
}
.habit-stat-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.habit-stat-head .name { font-size: 14px; font-weight: 500; flex: 1; }
.habit-stat-head .pct { font-size: 13px; font-weight: 600; color: var(--accent); }
.bar { width: 100%; height: 6px; background: var(--surface-3); border-radius: 999px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 400ms ease-out; }
.habit-stat-meta {
  display: flex; gap: 14px; margin-top: 6px;
  font-size: 11px; color: var(--text-muted);
}

/* === MODALS / SHEETS === */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: flex-end; justify-content: center;
  animation: backdropIn 200ms ease-out;
}
@keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  width: 100%; max-width: 480px;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  max-height: 92vh;
  display: flex; flex-direction: column;
  animation: sheetIn 280ms cubic-bezier(0.16, 1, 0.3, 1);
  padding-bottom: var(--safe-bottom);
}
@keyframes sheetIn { from { transform: translateY(100%); } to { transform: none; } }
.modal-full {
  height: 100%; max-height: 100%;
  border-radius: 0;
  animation: slideIn 280ms cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideIn { from { transform: translateX(100%); } to { transform: none; } }
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.modal-title { font-size: 17px; font-weight: 600; }
.modal-body { flex: 1; padding: 16px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.modal-foot { padding: 12px 16px calc(12px + var(--safe-bottom)); border-top: 1px solid var(--border); background: var(--surface); }
.handle-bar {
  width: 40px; height: 4px;
  background: var(--border-strong);
  border-radius: 2px;
  margin: 8px auto 4px;
}

/* === FORM SECTIONS === */
.form-section { margin-bottom: 18px; }
.form-label {
  display: block;
  font-size: 12px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 8px;
  padding: 0 2px;
}
.status-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.status-opt {
  padding: 10px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 12px; font-weight: 500;
  text-align: center;
  transition: all 150ms ease-out;
}
.status-opt .opt-icon { font-size: 18px; display: block; margin-bottom: 4px; }
.status-opt.active.important { border-color: var(--danger); background: var(--danger-soft); color: var(--danger); }
.status-opt.active.todo { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
.status-opt.active.delegated { border-color: var(--purple); background: var(--purple-soft); color: var(--purple); }

/* === SUBTASK === */
.subtask {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 4px;
  border-bottom: 1px solid var(--border);
}
.subtask:last-child { border-bottom: none; }
.subtask-check {
  flex: 0 0 22px; width: 22px; height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
}
.subtask-check svg { width: 12px; height: 12px; color: white; opacity: 0; }
.subtask.done .subtask-check { background: var(--success); border-color: var(--success); }
.subtask.done .subtask-check svg { opacity: 1; }
.subtask.done .subtask-input { text-decoration: line-through; color: var(--text-muted); }
.subtask-input {
  flex: 1; font-size: 14px;
  background: transparent;
  padding: 4px 0;
}
.subtask-del {
  flex: 0 0 32px; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-light);
  border-radius: 6px;
}
.subtask-del:active { background: var(--surface-2); color: var(--danger); }

/* === TOAST === */
#toast-container {
  position: fixed; bottom: calc(80px + var(--safe-bottom) + 20px); left: 0; right: 0;
  z-index: 200;
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; padding: 0 16px;
  pointer-events: none;
}
.toast {
  background: var(--text); color: white;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-lg);
  max-width: 320px;
  pointer-events: auto;
  animation: toastIn 200ms ease-out;
}
.toast .toast-action {
  color: var(--accent-soft); font-weight: 600;
  margin-left: 4px;
  white-space: nowrap;
}
@keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }

/* === EMPTY === */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; opacity: 0.6; }
.empty-state .text { font-size: 14px; }

/* === POMODORO === */
.pomo-screen {
  background: linear-gradient(180deg, #FEF3C7 0%, #FCD34D 100%);
  min-height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 24px;
  color: #78350F;
}
.pomo-mode { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 24px; }
.pomo-time { font-size: 88px; font-weight: 800; letter-spacing: -0.04em; font-variant-numeric: tabular-nums; }
.pomo-task { font-size: 14px; margin-top: 16px; opacity: 0.7; min-height: 20px; }

  transition: all 150ms ease-out;

.pomo-btn.primary { background: #78350F; color: white; width: 80px; height: 80px; border-radius: 40px; }
.pomo-btn svg { width: 28px; height: 28px; }
.pomo-btn.primary svg { width: 32px; height: 32px; }
.pomo-stats {

}

  display: flex; align-items: center; gap: 10px;

  border-radius: 14px;
  padding: 10px 12px;
  margin-bottom: 12px;
  transition: all 250ms ease-out;
}
.pomo-inline.running { background: linear-gradient(135deg, #FCD34D 0%, #FBBF24 100%); border-color: #F59E0B; }
.pomo-inline.break { background: linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 100%); border-color: #93C5FD; }
.pomo-inline .pomo-info { flex: 1; min-width: 0; }

}
.pomo-inline.break .pomo-mode-mini { color: #1E40AF; }
.pomo-time-mini {
  font-size: 26px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #78350F;
  line-height: 1.1;
  letter-spacing: -0.02em;
}
.pomo-inline.break .pomo-time-mini { color: #1E3A8A; }
.pomo-reset-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  color: #92400E;
  display: flex; align-items: center; justify-content: center;
  transition: background 150ms;
}
.pomo-reset-btn:active { background: rgba(255,255,255,0.5); }
.pomo-reset-btn svg { width: 18px; height: 18px; }
.pomo-action {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: #78350F; color: white;
  display: flex; align-items: center; justify-content: center;
  transition: transform 150ms, background 150ms;
}
.pomo-inline.break .pomo-action { background: #1E3A8A; }
.pomo-action:active { transform: scale(0.94); }
.pomo-action svg { width: 22px; height: 22px; }

/* === INLINE SUBTASKS DROPDOWN === */
.task-wrap { margin-bottom: 8px; }
.task-expand {
  flex: 0 0 auto;
  align-self: flex-start;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 9px 5px 10px;
  min-height: 28px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 12px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  transition: all 180ms ease-out;
}
.task-expand:active { transform: scale(0.94); background: var(--accent-soft); }
.task-expand.open {
  background: var(--accent-soft);
  border-color: #BFDBFE;
  color: var(--accent);
}
.task-expand .chev {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px;
  transition: transform 250ms ease-out;
}
.task-expand .chev svg { width: 14px; height: 14px; display: block; stroke-width: 3; }
.task-expand.open .chev { transform: rotate(180deg); }
.task-expand .sub-count { color: inherit; line-height: 1; }

.subtasks-inline {
  margin-top: 4px;
  margin-left: 20px;

}
@keyframes subOpen { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

.sub-mini {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.sub-mini:last-of-type { border-bottom: none; }
.sub-mini-check {

}
.sub-mini-check svg { width: 10px; height: 10px; color: white; opacity: 0; }
.sub-mini.done .sub-mini-check { background: var(--success); border-color: var(--success); }
.sub-mini.done .sub-mini-check svg { opacity: 1; }
.sub-mini.done .sub-mini-text { text-decoration: line-through; color: var(--text-muted); }
.sub-mini-text {
  flex: 1; font-size: 13px;
  background: transparent;
  padding: 2px 0;
  border: none;
}
.sub-mini-del {
  flex: 0 0 26px; width: 26px; height: 26px;

  color: var(--text-light);
  border-radius: 6px;
}
.sub-mini-del svg { width: 14px; height: 14px; }
.sub-mini-del:active { background: var(--surface-2); color: var(--danger); }
.sub-add-btn {
  display: flex; align-items: center; gap: 6px;
  width: 100%;
  padding: 8px 0;
  font-size: 13px;
  color: var(--accent);
  font-weight: 500;
}
.sub-add-btn svg { width: 14px; height: 14px; }

/* === CONFETTI === */
@keyframes confetti-fall {
  0% { transform: translateY(-20px) rotate(0); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
.confetti-piece {
  position: fixed; top: 0;
  width: 8px; height: 14px;
  pointer-events: none;
  z-index: 300;
  animation: confetti-fall 2s ease-out forwards;
}

/* === MISC === */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.row { display: flex; align-items: center; gap: 10px; }
.row.between { justify-content: space-between; }
.muted { color: var(--text-muted); }
.small { font-size: 12px; }
.bold { font-weight: 600; }
.spacer { flex: 1; }
.hidden { display: none !important; }

.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
}
.settings-row .label { font-size: 15px; }
.settings-row .desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.arch-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
}
.arch-card .date { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
.arch-card .preview { font-size: 13px; color: var(--text); }

.cat-tag {
  display: inline-block;
  padding: 3px 8px;
  background: var(--surface-2);
  color: var(--text-muted);
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }

const STORAGE_KEY = 'kayzen-app-data';
const APP_VERSION = 1;

];

const DEFAULT_CATEGORIES = ['Marketing', 'Shaxsiy', 'Sport', 'Moliya', 'AI'];

function uid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function defaultData() {
  return {
    version: APP_VERSION,
    tasks: [],
    checklist: {
      items: DEFAULT_HABITS.map((h, i) => ({ id: uid(), emoji: h.emoji, name: h.name, order: i })),
      days: {},
    },
    kayzen: {
      questions: DEFAULT_QUESTIONS.map((t, i) => ({ id: uid(), text: t, order: i })),
      entries: {},
    },
    categories: [...DEFAULT_CATEGORIES],
    pomodoro: {
      workMin: 25,
      shortBreakMin: 5,
      longBreakMin: 15,
      sessions: [],
    },
    settings: {
      theme: 'light',
      notificationsEnabled: false,
      lastBackupAt: null,
      firstRunCompleted: false,
    },
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultData();
    const parsed = JSON.parse(raw);
    // Migratsiya
    if (!parsed.version) parsed.version = 1;
    if (!parsed.categories) parsed.categories = [...DEFAULT_CATEGORIES];
    if (!parsed.pomodoro) parsed.pomodoro = { workMin: 25, shortBreakMin: 5, longBreakMin: 15, sessions: [] };
    if (!parsed.settings) parsed.settings = { theme: 'light' };
    return parsed;
  } catch (e) {
    console.error('Load error', e);
    return defaultData();
  }
}

function saveStateLocal() {
  // localStorage ga saqlash, cloud push siz
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
  } catch (e) {
    showToast("Saqlashda xatolik. Joy yetmagan bo'lishi mumkin.");
  }
}
function saveState() {
  saveStateLocal();
  if (state.sync && state.sync.enabled) scheduleCloudPush();
}

};

/* === DATE HELPERS === */
function todayKey() {
  return dateKey(new Date());
}
function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function parseKey(k) {
  const [y, m, d] = k.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function formatDateUz(d) {
  const months = ['Yanvar', 'Fevral', 'Mart', 'Aprel', 'May', 'Iyun', 'Iyul', 'Avgust', 'Sentabr', 'Oktabr', 'Noyabr', 'Dekabr'];
  const days = ['Yakshanba', 'Dushanba', 'Seshanba', 'Chorshanba', 'Payshanba', 'Juma', 'Shanba'];
  return d.getDate() + ' ' + months[d.getMonth()] + ', ' + days[d.getDay()];
}
function formatDateShort(d) {
  const months = ['Yan', 'Fev', 'Mar', 'Apr', 'May', 'Iyn', 'Iyl', 'Avg', 'Sen', 'Okt', 'Noy', 'Dek'];
  return d.getDate() + ' ' + months[d.getMonth()];
}
function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function isToday(k) { return k === todayKey(); }
function isFuture(k) { return parseKey(k).getTime() > parseKey(todayKey()).getTime(); }

/* === UI HELPERS === */
function el(html) {
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function vibrate(ms) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

let _toastTimer = null;
function showToast(text, actionLabel, actionFn, duration = 4500) {
  const wrap = document.getElementById('toast-container');
  wrap.innerHTML = '';
  const t = el(`<div class="toast"><span>${escapeHtml(text)}</span>${actionLabel ? `<button class="toast-action">${escapeHtml(actionLabel)}</button>` : ''}</div>`);
  if (actionLabel) {
    t.querySelector('.toast-action').onclick = () => { actionFn && actionFn(); t.remove(); };
  }
  wrap.appendChild(t);
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.remove(), duration);
}

function openSheet(content, opts = {}) {
  const host = document.getElementById('modal-host');
  const backdrop = el('<div class="modal-backdrop"></div>');
  const modal = el(`<div class="modal ${opts.full ? 'modal-full' : ''}"></div>`);
  if (!opts.full) modal.appendChild(el('<div class="handle-bar"></div>'));
  modal.appendChild(content);
  backdrop.appendChild(modal);
  backdrop.onclick = (e) => { if (e.target === backdrop) closeSheet(); };
  host.appendChild(backdrop);
  document.body.style.overflow = 'hidden';
  return backdrop;
}
function closeSheet() {
  const host = document.getElementById('modal-host');
  const last = host.lastElementChild;
  if (last) last.remove();
  if (!host.firstElementChild) document.body.style.overflow = '';
}
function closeAllSheets() {
  const host = document.getElementById('modal-host');
  host.innerHTML = '';
  document.body.style.overflow = '';
}

function confirmDialog(message, onYes) {
  const content = el(`
    <div>
      <div class="modal-head"><div class="modal-title">Tasdiqlash</div></div>
      <div class="modal-body"><p>${escapeHtml(message)}</p></div>

        <button class="btn btn-danger btn-block" id="ok">Ha, davom et</button>

  openSheet(content);
  content.querySelector('#cnc').onclick = closeSheet;
  content.querySelector('#ok').onclick = () => { closeSheet(); onYes(); };
}

/* ============================================================
   === TASKS ===
   ============================================================ */
function renderTasks() {
  const v = document.getElementById('view-tasks');
  v.innerHTML = '';

  // Inline Pomodoro (qidiruv o'rniga)
  const pomoWrap = el(`<div id="pomo-host"></div>`);
  v.appendChild(pomoWrap);
  renderInlinePomo();

  // Time filters
  const tFilter = el(`<div class="chip-row" id="time-filter"></div>`);
  const tOpts = [['today', 'Bugun'], ['tomorrow', 'Ertaga'], ['week', 'Bu hafta'], ['all', 'Barchasi'], ['done', 'Bajarilgan']];
  for (const [k, l] of tOpts) {
    const c = el(`<button class="chip ${state.taskFilter.time === k ? 'active' : ''}" data-k="${k}">${l}</button>`);
    c.onclick = () => { state.taskFilter.time = k; renderTasks(); };
    tFilter.appendChild(c);
  }
  v.appendChild(tFilter);

  // List
  const list = el(`<div id="task-list"></div>`);
  v.appendChild(list);

  renderTaskList();
}

function renderTaskList() {
  const list = document.getElementById('task-list');
  if (!list) return;
  list.innerHTML = '';
  const filtered = filterTasks();
  if (filtered.length === 0) {
    list.appendChild(el(`<div class="empty-state"><div class="emoji">🎯</div><div class="text">Bu yerda vazifa yo'q.<br/>O'ng pastdagi "+" tugmasi orqali qo'shing.</div></div>`));
    return;
  }
  filtered.forEach(t => list.appendChild(taskCard(t)));
}

function filterTasks() {
  const f = state.taskFilter;
  const today = todayKey();
  const tomorrow = dateKey(addDays(new Date(), 1));
  const weekEnd = dateKey(addDays(new Date(), 7));

  return state.data.tasks.filter(t => {
    if (t.archived) return false;
    if (f.time === 'done') { if (!t.completed) return false; }
    else if (t.completed) return false;
    if (f.time === 'today') {
      if (!t.deadline) return true; // bugungi deb hisoblanadi
      const dk = t.deadline.slice(0, 10);
      if (dk > today) return false;
    } else if (f.time === 'tomorrow') {
      if (!t.deadline || t.deadline.slice(0, 10) !== tomorrow) return false;
    } else if (f.time === 'week') {
      if (!t.deadline) return false;
      const dk = t.deadline.slice(0, 10);
      if (dk > weekEnd) return false;
    }
    return true;
  }).sort((a, b) => {
    if (a.deadline && b.deadline) return a.deadline.localeCompare(b.deadline);
    if (a.deadline) return -1;
    if (b.deadline) return 1;
    return (a.createdAt || '').localeCompare(b.createdAt || '');
  });
}

function taskCard(t) {
  const subDone = (t.subtasks || []).filter(s => s.done).length;
  const subTotal = (t.subtasks || []).length;
  const expanded = state.expandedTasks.has(t.id);

  let metaParts = [];
  if (t.deadline) {
    const dl = new Date(t.deadline);
    const tm = String(dl.getHours()).padStart(2, '0') + ':' + String(dl.getMinutes()).padStart(2, '0');
    metaParts.push(`<span class="badge badge-meta">📅 ${dateKey(dl) === todayKey() ? '' : formatDateShort(dl) + ' '}${tm}</span>`);
  }
  if (t.category) metaParts.push(`<span class="cat-tag">#${escapeHtml(t.category)}</span>`);

  const wrap = el(`<div class="task-wrap" data-id="${t.id}"></div>`);

  const card = el(`
    <div class="task-card ${t.completed ? 'completed' : ''}">
      <button class="task-check" aria-label="Bajarildi">${icons.check}</button>
      <div class="task-body">
        <div class="task-title">${escapeHtml(t.title)}</div>
        ${metaParts.length ? `<div class="task-meta">${metaParts.join('')}</div>` : ''}
      </div>
      <button class="task-expand ${expanded ? 'open' : ''}" aria-label="Subtasklar">
        ${subTotal > 0 ? `<span class="sub-count">${subDone}/${subTotal}</span>` : ''}
        <span class="chev">${icons.chevDown}</span>
      </button>
    </div>`);

  card.querySelector('.task-check').onclick = (e) => {
    e.stopPropagation();
    toggleTaskComplete(t.id);
  };
  card.querySelector('.task-expand').onclick = (e) => {
    e.stopPropagation();
    toggleExpand(t.id);
  };
  // Karta o'zi (title qismi) → detal modal
  card.querySelector('.task-body').onclick = () => openTaskDetail(t.id);

  wrap.appendChild(card);

  if (expanded) {
    wrap.appendChild(buildSubtasksInline(t));
  }
  return wrap;
}

function toggleExpand(id) {
  if (state.expandedTasks.has(id)) state.expandedTasks.delete(id);
  else state.expandedTasks.add(id);
  renderTaskList();
}

function buildSubtasksInline(t) {
  if (!t.subtasks) t.subtasks = [];
  const panel = el(`<div class="subtasks-inline"></div>`);

  t.subtasks.forEach((s, idx) => {
    const row = el(`
      <div class="sub-mini ${s.done ? 'done' : ''}">
        <button class="sub-mini-check" aria-label="Bajarildi">${icons.check}</button>
        <input class="sub-mini-text" value="${escapeHtml(s.title)}" placeholder="Subtask nomi..."/>
        <button class="sub-mini-del" aria-label="O'chirish">${icons.x}</button>
      </div>`);
    row.querySelector('.sub-mini-check').onclick = (e) => {
      e.stopPropagation();
      s.done = !s.done;
      vibrate(8);
      saveState();
      renderTaskList();
    };
    row.querySelector('.sub-mini-text').oninput = (e) => {
      s.title = e.target.value;
      saveState();
    };
    row.querySelector('.sub-mini-del').onclick = (e) => {
      e.stopPropagation();
      t.subtasks.splice(idx, 1);
      saveState();
      renderTaskList();
    };
    panel.appendChild(row);
  });

  const addBtn = el(`<button class="sub-add-btn">${icons.plus} Subtask qo'shish</button>`);
  addBtn.onclick = (e) => {
    e.stopPropagation();
    t.subtasks.push({ id: uid(), title: '', done: false });
    saveState();
    renderTaskList();
    // focus the newly added input
    setTimeout(() => {
      const wraps = document.querySelectorAll(`.task-wrap[data-id="${t.id}"] .sub-mini-text`);
      if (wraps.length) wraps[wraps.length - 1].focus();
    }, 30);
  };
  panel.appendChild(addBtn);

  return panel;
}

function toggleTaskComplete(id) {
  const t = state.data.tasks.find(x => x.id === id);
  if (!t) return;
  t.completed = !t.completed;
  t.completedAt = t.completed ? new Date().toISOString() : null;
  vibrate(10);
  saveState();
  renderTaskList();
  if (t.completed) {
    setTimeout(() => showToast("Vazifa bajarildi! 🎉"), 100);
  }
}

function createTask(opts = {}) {
  const t = {
    id: uid(),
    title: opts.title || '',
    completed: false,
    category: opts.category || '',
    deadline: opts.deadline || null,
    notes: '',
    subtasks: [],
    createdAt: new Date().toISOString(),
    completedAt: null,
    pomodoroCount: 0,
    archived: false,
  };
  state.data.tasks.unshift(t);
  saveState();
  return t;
}

function openQuickAdd() {

  content.querySelectorAll('#t-deadline .chip').forEach(b => {

    };

  function renderSubs() {

    subs.push({ title: '' });

    setTimeout(() => {

      if (inputs.length) inputs[inputs.length - 1].focus();

    const title = titleInput.value.trim();

        </div>

  v.appendChild(stats);

  // Habits list
  const list = el('<div id="habit-list"></div>');
  items.forEach(h => {
    const isDone = !!todayData[h.id];
    const spark = buildSparkline(h.id);
    const row = el(`
      <div class="habit-row ${isDone?'done':''}">
        <div class="habit-emoji">${h.emoji}</div>
        <div class="habit-info">
          <div class="habit-name">${escapeHtml(h.name)}</div>
          <div class="habit-spark">${spark}</div>
        </div>
        <button class="habit-check">${icons.check}</button>
      </div>`);
    row.onclick = () => {
      todayData[h.id] = !todayData[h.id];
      state.data.checklist.days[dk] = todayData;
      vibrate(12);
      saveState();
      const wasAllDone = items.every(i => todayData[i.id]);
      renderChecklist();
      if (wasAllDone && todayData[h.id]) confetti();
    };
    list.appendChild(row);
  });
  v.appendChild(list);
}

function buildSparkline(habitId) {
  // oxirgi 7 kun
  let html = '';
  const today = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = addDays(today, -i);
    const k = dateKey(d);
    const done = state.data.checklist.days[k] && state.data.checklist.days[k][habitId];
    const isT = k === todayKey();
    html += `<span class="spark-dot ${done?'done':''} ${isT?'today':''}"></span>`;
  }
  return html;
}

function computeStreak() {
  let s = 0;
  const items = state.data.checklist.items;
  if (items.length === 0) return 0;
  let cursor = new Date();
  // Start from today; if today not all done, check yesterday-based streak
  for (let i = 0; i < 366; i++) {
    const k = dateKey(cursor);
    const day = state.data.checklist.days[k] || {};
    const allDone = items.every(it => day[it.id]);
    if (allDone) s++;
    else { if (i === 0) { /* today not full — keep checking yesterday */ } else break; }
    cursor = addDays(cursor, -1);
  }
  return s;
}

function buildDateNav(dk, onChange) {
  const d = parseKey(dk);
  const isT = dk === todayKey();
  const nav = el(`
    <div class="date-nav">
      <button class="nav-arrow" id="prev">${icons.chevL}</button>
      <button style="flex:1;background:none;">
        <div class="date-label">${formatDateUz(d)}</div>
        <div class="date-sub">${isT ? 'Bugun' : (dk === dateKey(addDays(new Date(), -1)) ? 'Kecha' : '')}</div>
      </button>
      <button class="nav-arrow" id="next" ${isFuture(dateKey(addDays(d, 1))) ? 'style="opacity:0.4"' : ''}>${icons.chevR}</button>
    </div>`);
  nav.querySelector('#prev').onclick = () => onChange(dateKey(addDays(d, -1)));
  nav.querySelector('#next').onclick = () => {
    const nk = dateKey(addDays(d, 1));
    if (!isFuture(nk)) onChange(nk);
  };
  return nav;
}

function confetti() {
  const colors = ['#16A34A', '#2563EB', '#F59E0B', '#DC2626', '#8B5CF6'];

    const p = document.createElement('div');

  const items = state.data.checklist.items;
  for (let i = 6; i >= 0; i--) {
    const d = addDays(new Date(), -i);
    labels.push(formatDateShort(d));
    const day = state.data.checklist.days[dateKey(d)] || {};
    const done = items.filter(it => day[it.id]).length;
    data.push(items.length ? Math.round(done / items.length * 100) : 0);
  }
  if (_statsChart) _statsChart.destroy();
  if (typeof Chart === 'undefined') {
    ctx.replaceWith(el('<div class="muted small">Grafik yuklanmadi (internet kerak)</div>'));
    return;
  }
  _statsChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '% bajarildi',
        data,
        backgroundColor: '#2563EB',
        borderRadius: 6,
        barThickness: 22,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.parsed.y + '%' } } },
      scales: {
        y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%', font: { size: 11 }, color: '#71717A' }, grid: { color: '#F4F4F5' } },
        x: { ticks: { font: { size: 11 }, color: '#71717A' }, grid: { display: false } },
      },
    },
  });
}

function renderHeatmap() {
  const wrap = document.getElementById('heatmap');
  if (!wrap) return;
  wrap.innerHTML = '';
  // 84 kun, har bir hafta = ustun. Faktic: 12 hafta * 7 kun = 84
  const today = new Date();
  const items = state.data.checklist.items;
  // har hafta uchun: yakshanba-shanba ustun yoki dushanba-yakshanba? Soddalik uchun gorizontal grid 7 ustun
  const days = [];
  for (let i = 83; i >= 0; i--) days.push(addDays(today, -i));
  // grid is 7 columns wide (weekdays). We need to align: pad so that the latest week ends with today's weekday at right
  const firstDow = days[0].getDay();
  const pad = (firstDow + 6) % 7; // dushanba = 0 deb hisoblasak
  // Actually simpler: just render 84 cells in 7-col grid with 12 rows
  // Re-design: 7 columns (dushanba-yakshanba), 12 rows (haftalar)
  // Calculate column for first day:
  for (let i = 0; i < pad; i++) {
    const ph = document.createElement('div');
    ph.className = 'heatmap-cell';
    ph.style.opacity = 0;
    wrap.appendChild(ph);
  }
  days.forEach(d => {
    const k = dateKey(d);
    const day = state.data.checklist.days[k] || {};
    const done = items.length ? items.filter(it => day[it.id]).length / items.length : 0;
    let bg = '#EFEFEF';
    if (done > 0 && done < 0.3) bg = '#BBF7D0';
    else if (done < 0.6) bg = '#86EFAC';
    else if (done < 0.9) bg = '#4ADE80';
    else if (done >= 0.9) bg = '#16A34A';
    const cell = document.createElement('div');
    cell.className = 'heatmap-cell';
    cell.style.background = bg;
    cell.title = formatDateUz(d) + ' — ' + Math.round(done * 100) + '%';
    cell.onclick = () => {
      state.currentDate = k;
      switchView('checklist');
    };
    wrap.appendChild(cell);
  });
}

function renderHabitStats() {
  const wrap = document.getElementById('habit-stats');
  if (!wrap) return;
  wrap.innerHTML = '';
  const items = [...state.data.checklist.items].sort((a, b) => a.order - b.order);
  items.forEach(h => {
    let done = 0;
    let streak = 0;
    let maxStreak = 0;
    let cur = 0;
    for (let i = 29; i >= 0; i--) {
      const k = dateKey(addDays(new Date(), -i));
      const v = state.data.checklist.days[k] && state.data.checklist.days[k][h.id];
      if (v) { done++; cur++; maxStreak = Math.max(maxStreak, cur); }
      else cur = 0;
    }
    // Current streak from today backwards
    let curS = 0;
    for (let i = 0; i < 365; i++) {
      const k = dateKey(addDays(new Date(), -i));
      const v = state.data.checklist.days[k] && state.data.checklist.days[k][h.id];
      if (v) curS++;
      else { if (i === 0) {} else break; }
    }
    const pct = Math.round(done / 30 * 100);
    const row = el(`
      <div class="habit-stat-row">
        <div class="habit-stat-head">
          <span style="font-size:18px;">${h.emoji}</span>
          <span class="name">${escapeHtml(h.name)}</span>
          <span class="pct">${pct}%</span>
        </div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%;"></div></div>
        <div class="habit-stat-meta">
          <span>🔥 Hozir: ${curS} kun</span>
          <span>⭐ Eng yaxshi: ${maxStreak} kun</span>
        </div>
      </div>`);
    wrap.appendChild(row);
  });
}

function ensurePomoState() {
  if (!state.pomodoro) {
    state.pomodoro = {
      running: false,
      mode: 'work', // 'work' | 'short' | 'long'
      secondsLeft: state.data.pomodoro.workMin * 60,
      taskId: null,
      sessionCount: 0,
    };
  }
}

function fmtPomoTime(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return String(m).padStart(2, '0') + ':' + String(ss).padStart(2, '0');
}

function pomoModeLabel() {
  if (state.pomodoro.mode === 'work') return 'FOKUS';
  if (state.pomodoro.mode === 'short') return 'QISQA DAM';
  return 'UZOQ DAM';
}

function renderInlinePomo() {
  ensurePomoState();
  const host = document.getElementById('pomo-host');
  if (!host) return;
  const p = state.pomodoro;
  const isBreak = p.mode !== 'work';
  const task = p.taskId ? state.data.tasks.find(t => t.id === p.taskId) : null;
  const modeText = pomoModeLabel() + (task ? ' · ' + (task.title.length > 22 ? task.title.slice(0, 22) + '…' : task.title) : '');

  host.innerHTML = '';
  const card = el(`
    <div class="pomo-inline ${p.running ? 'running' : ''} ${isBreak ? 'break' : ''}">
      <div class="pomo-info">
        <div class="pomo-mode-mini">🍅 ${escapeHtml(modeText)}</div>
        <div class="pomo-time-mini">${fmtPomoTime(p.secondsLeft)}</div>
      </div>
      <button class="pomo-reset-btn" data-act="reset" aria-label="Qaytadan">${icons.reset}</button>
      <button class="pomo-action" data-act="toggle" aria-label="${p.running ? 'Pauza' : 'Boshlash'}">${p.running ? icons.pause : icons.play}</button>
    </div>`);
  card.querySelector('[data-act="toggle"]').onclick = togglePomo;
  card.querySelector('[data-act="reset"]').onclick = resetPomo;
  host.appendChild(card);
}

function currentModeSeconds() {
  const p = state.data.pomodoro;
  const m = state.pomodoro.mode;
  if (m === 'work') return p.workMin * 60;
  if (m === 'short') return p.shortBreakMin * 60;
  return p.longBreakMin * 60;
}

let _pomoTimer = null;
function togglePomo() {
  ensurePomoState();
  if (state.pomodoro.running) {
    state.pomodoro.running = false;
    clearInterval(_pomoTimer);
  } else {
    state.pomodoro.running = true;
    if (state.pomodoro.secondsLeft <= 0) state.pomodoro.secondsLeft = currentModeSeconds();
    startPomoTick();
    // ruxsat so'rash
    if ('Notification' in window && Notification.permission === 'default') {
      try { Notification.requestPermission(); } catch(e){}
    }
  }
  renderInlinePomo();
}

function resetPomo() {
  ensurePomoState();
  state.pomodoro.running = false;
  clearInterval(_pomoTimer);
  state.pomodoro.secondsLeft = currentModeSeconds();
  renderInlinePomo();
}

function startPomoTick() {
  clearInterval(_pomoTimer);
  _pomoTimer = setInterval(() => {
    if (!state.pomodoro || !state.pomodoro.running) {
      clearInterval(_pomoTimer);
      return;
    }
    state.pomodoro.secondsLeft--;
    if (state.pomodoro.secondsLeft <= 0) {
      clearInterval(_pomoTimer);
      onPomodoroDone();
    }
    // Faqat Vazifalar bo'limidagi inline taymerni yangilash
    if (state.currentView === 'tasks') {
      const tEl = document.querySelector('.pomo-time-mini');
      if (tEl) tEl.textContent = fmtPomoTime(state.pomodoro.secondsLeft);
    }
  }, 1000);
}

function advancePomodoroMode() {
  if (state.pomodoro.mode === 'work') {
    state.pomodoro.sessionCount++;
    state.pomodoro.mode = (state.pomodoro.sessionCount % 4 === 0) ? 'long' : 'short';
  } else {
    state.pomodoro.mode = 'work';
  }
  state.pomodoro.secondsLeft = currentModeSeconds();
}

function onPomodoroDone() {
  try { playBeep(); } catch (e) {}
  vibrate([200, 100, 200, 100, 400]);
  if ('Notification' in window && Notification.permission === 'granted') {
    try { new Notification('Pomodoro tugadi', { body: state.pomodoro.mode === 'work' ? 'Dam olishga vaqt' : 'Ishga qaytishga vaqt' }); } catch(e){}
  }
  if (state.pomodoro.mode === 'work') {
    state.data.pomodoro.sessions.push({
      date: todayKey(),
      minutes: state.data.pomodoro.workMin,
      taskId: state.pomodoro.taskId || null,
      completedAt: new Date().toISOString(),
    });
    if (state.pomodoro.taskId) {
      const t = state.data.tasks.find(x => x.id === state.pomodoro.taskId);
      if (t) t.pomodoroCount = (t.pomodoroCount || 0) + 1;
    }
    saveState();
  }
  advancePomodoroMode();
  renderInlinePomo();
}

// Vazifa detalidan chaqiriladi
function startPomoForTask(taskId) {
  ensurePomoState();
  // Agar ish rejimida emas yoki ishlamayotgan bo'lsa — to'liq qaytadan boshlash
  if (state.pomodoro.mode !== 'work' || !state.pomodoro.running) {
    state.pomodoro.mode = 'work';
    state.pomodoro.secondsLeft = state.data.pomodoro.workMin * 60;
  }
  state.pomodoro.taskId = taskId;
  state.pomodoro.running = true;
  switchView('tasks');
  startPomoTick();
  renderInlinePomo();
}

function playBeep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value = 880;
  g.gain.value = 0.15;
  o.start();
  setTimeout(() => { o.frequency.value = 660; }, 150);
  setTimeout(() => { o.stop(); ctx.close(); }, 350);
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}
function exportAll() {
  const name = `kayzen-backup-${todayKey()}.json`;
  downloadFile(name, JSON.stringify(state.data, null, 2), 'application/json');
  state.data.settings.lastBackupAt = new Date().toISOString();
  saveState();
  showToast('Backup yuklab olindi');
}
function importAll() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'application/json';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.tasks && !data.checklist) throw new Error('Noto\'g\'ri format');
        confirmDialog("Eski ma'lumotlar ustiga yoziladi. Davom etamizmi?", () => {
          state.data = data;
          saveState();
          closeSheet();
          renderView();
          showToast('Backup tiklandi');
        });
      } catch (e) {
        showToast("Noto'g'ri fayl");
      }
    };
    reader.readAsText(f);
  };
  inp.click();
}

    const dl = new Date(t.deadline).getTime();
    const diff = dl - now;
    if (diff > 0 && diff < 60000 && !t._notified) {
      t._notified = true;
      new Notification('Vazifa muddati keldi', { body: t.title });
    }
  });
}

async function loadSupabaseLib() {
  if (window.supabase && window.supabase.createClient) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Supabase yuklanmadi'));
    document.head.appendChild(s);
  });
}

function setSyncStatus(status) {
  state.syncStatus = status;
  const el = document.getElementById('sync-status-text');
  if (el) {
    if (status === 'syncing') el.textContent = 'Sinxronlanmoqda...';
    else if (status === 'error') el.textContent = 'Xato — internet tekshiring';
    else el.textContent = state.sync.lastSyncedAt ? 'Sinxron: ' + relTime(state.sync.lastSyncedAt) : 'Tayyor';
  }
}
function relTime(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return Math.round(diff) + ' sek oldin';
  if (diff < 3600) return Math.round(diff / 60) + ' daq oldin';
  if (diff < 86400) return Math.round(diff / 3600) + ' soat oldin';
  return Math.round(diff / 86400) + ' kun oldin';
}

async function initSync() {
  if (!state.sync.enabled || !state.sync.syncId) return;
  try {
    setSyncStatus('syncing');
    await loadSupabaseLib();
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await fetchFromCloud({ initial: true });
    subscribeRealtime();
  } catch (e) {
    console.error('Sync init xato', e);
    setSyncStatus('error');
  }
}

async function fetchFromCloud(opts = {}) {
  if (!supabase || !state.sync.syncId) return;
  try {
    setSyncStatus('syncing');
    const { data, error } = await supabase
      .from('kayzen_data')
      .select('data, updated_at')
      .eq('sync_id', state.sync.syncId)
      .maybeSingle();
    if (error) throw error;
    if (data && data.data) {
      const remote = data.data;
      const remoteT = remote._t || 0;
      const localT = state.data._t || 0;
      if (remoteT > localT) {
        applyRemoteData(remote);
        if (!opts.initial) showToast('☁️ Cloud dan yangilandi');
      } else if (localT > remoteT) {
        await pushToCloud();
      }
    } else {
      // hali cloudda hech narsa yo'q — lokalini push qilamiz
      await pushToCloud();
    }
    state.sync.lastSyncedAt = new Date().toISOString();
    saveSyncSettings();
    setSyncStatus('idle');
  } catch (e) {
    console.error('Fetch xato', e);
    setSyncStatus('error');
  }
}

function applyRemoteData(remote) {
  // remote ma'lumotlarni state.data ga tatbiq qilamiz
  // _clientId ni saqlamaymiz
  const newData = { ...remote };
  delete newData._clientId;
  // kerakli kalitlar mavjudligini ta'minlash
  if (!newData.tasks) newData.tasks = [];
  if (!newData.checklist) newData.checklist = { items: [], days: {} };
  if (!newData.kayzen) newData.kayzen = { questions: [], entries: {} };
  if (!newData.categories) newData.categories = [];
  if (!newData.pomodoro) newData.pomodoro = { workMin: 25, shortBreakMin: 5, longBreakMin: 15, sessions: [] };
  if (!newData.settings) newData.settings = { theme: 'light' };
  state.data = newData;
  saveStateLocal();
  // Hozirgi view ni qayta render qilish
  renderView();
}

async function pushToCloud() {
  if (!supabase || !state.sync.syncId) return;
  try {
    setSyncStatus('syncing');
    state.data._t = Date.now();
    saveStateLocal();
    const dataToSend = { ...state.data, _clientId: CLIENT_ID };
    const { error } = await supabase
      .from('kayzen_data')
      .upsert({ sync_id: state.sync.syncId, data: dataToSend }, { onConflict: 'sync_id' });
    if (error) throw error;
    state.sync.lastSyncedAt = new Date().toISOString();
    saveSyncSettings();
    setSyncStatus('idle');
  } catch (e) {
    console.error('Push xato', e);
    setSyncStatus('error');
  }
}

function scheduleCloudPush() {
  if (!state.sync.enabled || !supabase) return;
  clearTimeout(_syncPushTimer);
  _syncPushTimer = setTimeout(pushToCloud, 1500);
}

function subscribeRealtime() {
  if (!supabase || !state.sync.syncId) return;
  if (realtimeChannel) { try { supabase.removeChannel(realtimeChannel); } catch(e){} }
  realtimeChannel = supabase
    .channel('kayzen-' + state.sync.syncId)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'kayzen_data',
      filter: 'sync_id=eq.' + state.sync.syncId,
    }, (payload) => {
      if (!payload.new || !payload.new.data) return;
      const remote = payload.new.data;
      if (remote._clientId === CLIENT_ID) return; // o'z echo'miz
      const remoteT = remote._t || 0;
      const localT = state.data._t || 0;
      if (remoteT > localT) {
        applyRemoteData(remote);
        showToast('☁️ Yangilandi (boshqa qurilmadan)');
      }
    })
    .subscribe();
}

function unsubscribeRealtime() {
  if (realtimeChannel && supabase) {
    try { supabase.removeChannel(realtimeChannel); } catch(e){}
    realtimeChannel = null;
  }
}

async function enableCloudSync() {
  if (!state.sync.syncId) state.sync.syncId = uid();
  state.sync.enabled = true;
  saveSyncSettings();
  await initSync();
}

function disableCloudSync() {
  state.sync.enabled = false;
  saveSyncSettings();
  unsubscribeRealtime();
  supabase = null;
}

async function connectWithSyncKey(key) {
  state.sync.syncId = key.trim();
  state.sync.enabled = true;
  saveSyncSettings();
  try {
    setSyncStatus('syncing');
    await loadSupabaseLib();
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data, error } = await supabase
      .from('kayzen_data')
      .select('data')
      .eq('sync_id', state.sync.syncId)
      .maybeSingle();
    if (error) throw error;
    if (data && data.data) {
      applyRemoteData(data.data);
      showToast('☁️ Cloud ma\'lumotlari yuklandi');
    } else {
      await pushToCloud();
      showToast('☁️ Yangi kalit ulandi');
    }
    state.sync.lastSyncedAt = new Date().toISOString();
    saveSyncSettings();
    subscribeRealtime();
    setSyncStatus('idle');
  } catch (e) {
    console.error(e);
    setSyncStatus('error');
    showToast('Xato: ' + (e.message || 'ulanish muvaffaqiyatsiz'));
  }
}

/* ============================================================
   === PWA: MANIFEST + SERVICE WORKER ===
   ============================================================ */
function installPWA() {
  // Manifest as blob URL
  const manifest = {
    name: 'Kayzen — Samaradorlik',
    short_name: 'Kayzen',
    start_url: './',
    display: 'standalone',
    background_color: '#FAFAF9',
    theme_color: '#FAFAF9',
    description: 'Shaxsiy samaradorlik ilovasi',
    icons: [
      { src: "data:image/svg+xml;utf8," + encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='42' fill='#FAFAF9'/><path d='M54 100 L84 130 L142 70' stroke='#2563EB' stroke-width='18' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>"), sizes: '192x192', type: 'image/svg+xml' },
      { src: "data:image/svg+xml;utf8," + encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='112' fill='#FAFAF9'/><path d='M144 268 L224 348 L380 188' stroke='#2563EB' stroke-width='48' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>"), sizes: '512x512', type: 'image/svg+xml' },
    ],
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.head.appendChild(link);

  // Service worker — network-first, cache-fallback (yangi versiya doimo yuklanadi)
  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
    const swCode = `
      const CACHE = 'kayzen-v3';
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => {
        e.waitUntil(
          caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k))))
            .then(() => self.clients.claim())
        );
      });
      self.addEventListener('fetch', e => {
        if (e.request.method !== 'GET') return;
        // Network-first: doimo eng yangi versiyani olishga harakat qilamiz
        e.respondWith(
          fetch(e.request).then(fresh => {
            if (fresh && fresh.status === 200 && fresh.type === 'basic') {
              const copy = fresh.clone();
              caches.open(CACHE).then(c => c.put(e.request, copy)).catch(() => {});
            }
            return fresh;
          }).catch(() => caches.match(e.request))
        );
      });
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).then(reg => {
      reg.update();
      // Eski SW ni darhol almashtirish
      if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    }).catch(() => {});

    // Yangi versiya kelganda darhol foydalanish
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  }
}

/* ============================================================
   === INIT ===
   ============================================================ */
function init() {
  installPWA();

  // Sync settings yuklash
  state.sync = loadSyncSettings();

  // Telegram Mini App aniqlash
  if (window.Telegram && window.Telegram.WebApp) {
    try {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      const user = tg.initDataUnsafe && tg.initDataUnsafe.user;
      if (user && user.id) {
        const tgSyncId = 'tg-' + user.id;
        if (!state.sync.enabled || !state.sync.syncId) {
          state.sync.enabled = true;
          state.sync.syncId = tgSyncId;
          saveSyncSettings();
        }
      }
    } catch (e) { console.warn('Telegram init xato', e); }
  }

  // Tab buttons
  document.querySelectorAll('.tab').forEach(b => {
    b.onclick = () => switchView(b.dataset.view);
  });
  // FAB
  document.getElementById('fab').onclick = () => {
    if (state.currentView === 'tasks') openQuickAdd();
    else if (state.currentView === 'checklist') openHabitsManager();
    else if (state.currentView === 'kayzen') openKayzenManager();
    else if (state.currentView === 'stats') exportAll();
  };

  // Initial render
  renderTopbar();
  renderView();

  // Cloud sync (agar yoqilgan bo'lsa)
  if (state.sync.enabled && state.sync.syncId) {
    initSync();
  }

  // Onboarding
  if (!state.data.settings.firstRunCompleted) {
    setTimeout(maybeOnboarding, 400);
  }

  // Backup reminder
  const last = state.data.settings.lastBackupAt;
  if (last) {
    const diff = Date.now() - new Date(last).getTime();
    if (diff > 14 * 24 * 60 * 60 * 1000) {
      setTimeout(() => showToast('Backup yuklab olish vaqti keldi', 'Eksport', exportAll), 3000);
    }
  }
}

document.addEventListener('DOMContentLoaded', init);
if (document.readyState === 'interactive' || document.readyState === 'complete') init();
